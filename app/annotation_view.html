<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>标注展示 - TurbineLabelStudio</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="page viewer-page">
    <section class="viewer-shell">
      <section class="panel viewer-main-panel">
        <div class="media-layout">
          <div class="audio-progress">
            <button class="secondary icon-button" id="playBtn" title="播放" aria-label="播放" disabled>▶</button>
            <input id="audioProgress" type="range" min="0" max="0" step="0.01" value="0" disabled>
            <span id="audioTime">0:00 / 0:00</span>
            <label class="gain-control">增益
              <select id="gainInput">
                <option value="0.1">0.1</option>
                <option value="0.5">0.5</option>
                <option value="1">1</option>
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="20">20</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </label>
          </div>
          <div class="image-stage" id="imageStage">
            <div class="image-canvas" id="imageCanvas">
              <img id="targetImage" alt="">
              <svg id="boxLayer" viewBox="0 0 1200 1200"></svg>
              <div class="playhead-line hidden" id="playheadLine"></div>
            </div>
            <div class="empty-state" id="emptyImage">暂无图片</div>
          </div>
          <div class="channel-button-panel">
            <div class="channel-button-list" id="channelButtonList"></div>
          </div>
        </div>
        <audio id="activeAudio" preload="metadata"></audio>
      </section>

      <aside class="viewer-side">
        <section class="panel load-panel">
          <label>标签
            <select id="labelFilter"></select>
          </label>
          <label>BUC
            <select id="bucInput"></select>
          </label>
          <span class="status hidden" id="status"></span>
        </section>
        <section class="panel annotation-panel">
          <div class="side-title">
            <strong>标注结果</strong>
            <span id="annotationCount">0</span>
          </div>
          <div class="annotation-list" id="annotationList"></div>
        </section>
      </aside>
    </section>
  </main>

  <script src="/static/common.js"></script>
  <script>
    requireLogin();

    const state = {
      options: [],
      data: null,
      selectedId: null,
      selectedChannel: null,
      segmentTimer: null,
      playbackContext: null,
      playbackSourceNode: null,
      playbackGainNode: null
    };

    const statusEl = document.getElementById('status');
    const labelFilter = document.getElementById('labelFilter');
    const bucInput = document.getElementById('bucInput');
    const targetImage = document.getElementById('targetImage');
    const imageCanvas = document.getElementById('imageCanvas');
    const boxLayer = document.getElementById('boxLayer');
    const emptyImage = document.getElementById('emptyImage');
    const annotationList = document.getElementById('annotationList');
    const channelButtonList = document.getElementById('channelButtonList');
    const activeAudio = document.getElementById('activeAudio');
    const playBtn = document.getElementById('playBtn');
    const audioProgress = document.getElementById('audioProgress');
    const audioTime = document.getElementById('audioTime');
    const gainInput = document.getElementById('gainInput');
    const playheadLine = document.getElementById('playheadLine');
    const CHANNEL_ORDER = ['B1A', 'B1B', 'B2A', 'B2B', 'B3A', 'B3B'];
    const IMAGE_WIDTH = 1200;

    function setStatus(text, type = '') {
      statusEl.className = `status ${type}`.trim();
      statusEl.textContent = text;
    }

    function clearStatus() {
      statusEl.className = 'status hidden';
      statusEl.textContent = '';
    }

    function optionHasLabel(item, labelId) {
      if (!labelId) return true;
      return (item.labels || []).some(label => String(label.id) === String(labelId));
    }

    function filteredOptions() {
      return state.options.filter(item => optionHasLabel(item, labelFilter.value));
    }

    function renderLabelFilter() {
      const labels = [];
      const seen = new Set();
      for (const item of state.options) {
        for (const label of item.labels || []) {
          if (seen.has(label.id)) continue;
          seen.add(label.id);
          labels.push(label);
        }
      }
      labels.sort((a, b) => a.id - b.id);
      labelFilter.innerHTML = '<option value="">全部标签</option>' + labels
        .map(label => `<option value="${label.id}">${escapeHtml(label.label)}</option>`)
        .join('');
    }

    function renderOptions() {
      const options = filteredOptions();
      bucInput.innerHTML = options.map((item, index) => `
        <option value="${index}">${escapeHtml(item.buc)}</option>
      `).join('');
    }

    function colorFor(item) {
      return item.label_color || '#0f5f8a';
    }

    function renderBoxes() {
      const annotations = state.data?.annotations || [];
      boxLayer.setAttribute('viewBox', '0 0 1200 1200');
      boxLayer.innerHTML = annotations.map(item => {
        const x = Math.min(item.x1, item.x2);
        const y = Math.min(item.y1, item.y2);
        const width = Math.abs(item.x2 - item.x1);
        const height = Math.abs(item.y2 - item.y1);
        const selected = item.id === state.selectedId;
        const color = colorFor(item);
        return `
          <g class="anno-box ${selected ? 'selected' : ''}" data-id="${item.id}">
            <rect x="${x}" y="${y}" width="${width}" height="${height}" style="--box:${escapeHtml(color)}"></rect>
          </g>
        `;
      }).join('');
      boxLayer.querySelectorAll('.anno-box').forEach(node => {
        node.addEventListener('click', event => {
          event.stopPropagation();
          selectAnnotation(Number(node.dataset.id));
        });
      });
    }

    function renderAnnotationList() {
      const annotations = state.data?.annotations || [];
      document.getElementById('annotationCount').textContent = annotations.length;
      annotationList.innerHTML = annotations.map(item => {
        const selected = item.id === state.selectedId;
        const label = item.label || `label_id=${item.label_id}`;
        return `
          <button class="annotation-row ${selected ? 'active' : ''}" data-id="${item.id}">
            <span class="swatch" style="--chip:${escapeHtml(colorFor(item))}"></span>
            <span>
              <strong>${escapeHtml(label)}</strong>
              <small>#${item.id} · ${Math.round(item.x1)},${Math.round(item.y1)} - ${Math.round(item.x2)},${Math.round(item.y2)}</small>
            </span>
          </button>
        `;
      }).join('') || '<div class="empty-list">暂无标注</div>';
      annotationList.querySelectorAll('.annotation-row').forEach(node => {
        node.addEventListener('click', () => selectAnnotation(Number(node.dataset.id)));
      });
    }

    function renderChannels() {
      const channels = state.data?.channels || [];
      if (!state.selectedChannel || !channels.some(item => item.position_id === state.selectedChannel && item.audio_url)) {
        state.selectedChannel = channels.find(item => item.audio_url)?.position_id || null;
      }
      channelButtonList.innerHTML = channels.map(item => `
        <button
          class="channel-button ${item.position_id === state.selectedChannel ? 'active' : ''}"
          data-position="${escapeHtml(item.position_id)}"
          ${item.audio_url ? '' : 'disabled'}
        >${escapeHtml(item.position_id)}</button>
      `).join('');
      channelButtonList.querySelectorAll('.channel-button').forEach(node => {
        node.addEventListener('click', () => playSelectedAnnotationByChannel(node.dataset.position));
      });
      loadSelectedAudio();
    }

    function channelFromPointer(event) {
      if (!event) return null;
      const rect = imageCanvas.getBoundingClientRect();
      if (!rect.height) return null;
      const y = Math.max(0, Math.min(rect.height - 1, event.clientY - rect.top));
      const index = Math.max(0, Math.min(CHANNEL_ORDER.length - 1, Math.floor(y / rect.height * CHANNEL_ORDER.length)));
      return CHANNEL_ORDER[index];
    }

    function markSelectedChannel() {
      channelButtonList.querySelectorAll('.channel-button').forEach(row => {
        row.classList.toggle('active', row.dataset.position === state.selectedChannel);
      });
    }

    function selectAnnotation(id, options = {}) {
      state.selectedId = id;
      renderBoxes();
      renderAnnotationList();
      const row = annotationList.querySelector(`[data-id="${id}"]`);
      if (row) row.scrollIntoView({ block: 'nearest' });
      if (options.autoPlay) playSelectedAnnotation();
    }

    function playSelectedAnnotationAtPointer(event) {
      if (!state.selectedId) return;
      const channel = channelFromPointer(event);
      playSelectedAnnotationByChannel(channel);
    }

    function playSelectedAnnotationByChannel(channel) {
      if (!state.selectedId) return;
      if (!channel || !(state.data?.channels || []).some(item => item.position_id === channel && item.audio_url)) return;
      state.selectedChannel = channel;
      markSelectedChannel();
      loadSelectedAudio();
      playSelectedAnnotation();
    }

    async function loadOptions() {
      const data = await apiFetch('/api/annotation-view/options');
      state.options = data.items || [];
      renderLabelFilter();
      renderOptions();
      const options = filteredOptions();
      if (options.length) bucInput.value = '0';
      clearStatus();
    }

    function selectedOption() {
      const options = filteredOptions();
      return options[Number(bucInput.value)] || null;
    }

    async function loadData() {
      const option = selectedOption();
      const buc = option?.buc;
      const funcName = option?.func;
      if (!buc || !funcName) {
        setStatus('请选择 BUC', 'bad');
        return;
      }
      clearStatus();
      try {
        const data = await apiFetch(`/api/annotation-view/data?buc=${encodeURIComponent(buc)}&func=${encodeURIComponent(funcName)}`);
        state.data = data;
        state.selectedId = data.annotations[0]?.id || null;
        state.selectedChannel = data.channels.find(item => item.audio_url)?.position_id || null;
        resetAudio();
        targetImage.src = data.image_url;
        emptyImage.classList.add('hidden');
        renderAnnotationList();
        renderChannels();
        clearStatus();
      } catch (error) {
        setStatus(error.message, 'bad');
      }
    }

    function moveOption(delta) {
      const options = filteredOptions();
      if (!options.length) return;
      const current = Number(bucInput.value);
      const nextIndex = current < 0
        ? (delta > 0 ? 0 : options.length - 1)
        : (current + delta + options.length) % options.length;
      bucInput.value = String(nextIndex);
      loadData();
    }

    targetImage.addEventListener('load', () => {
      if (targetImage.naturalWidth !== 1200 || targetImage.naturalHeight !== 1200) {
        setStatus(`图片尺寸为 ${targetImage.naturalWidth}×${targetImage.naturalHeight}，标注层仍按 1200×1200 坐标显示`, 'bad');
      }
      renderBoxes();
    });

    targetImage.addEventListener('error', () => {
      boxLayer.innerHTML = '';
      emptyImage.classList.remove('hidden');
      setStatus('图片加载失败', 'bad');
    });

    labelFilter.addEventListener('change', () => {
      renderOptions();
      const options = filteredOptions();
      if (options.length) {
        bucInput.value = '0';
        loadData();
      } else {
        bucInput.innerHTML = '';
      }
    });
    bucInput.addEventListener('change', loadData);
    imageCanvas.addEventListener('click', playSelectedAnnotationAtPointer);
    document.addEventListener('keydown', event => {
      const tag = event.target?.tagName;
      if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
      if (event.key === 'a' || event.key === 'A') {
        event.preventDefault();
        moveOption(-1);
      }
      if (event.key === 'd' || event.key === 'D') {
        event.preventDefault();
        moveOption(1);
      }
    });

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds <= 0) return '0:00';
      const minutes = Math.floor(seconds / 60);
      const remain = Math.floor(seconds % 60).toString().padStart(2, '0');
      return `${minutes}:${remain}`;
    }

    function updateAudioTime() {
      const duration = activeAudio.duration || 0;
      audioProgress.max = duration || 0;
      audioProgress.value = activeAudio.currentTime || 0;
      audioTime.textContent = `${formatTime(activeAudio.currentTime)} / ${formatTime(duration)}`;
      updatePlayhead();
    }

    function resetAudio() {
      clearSegmentTimer();
      activeAudio.pause();
      activeAudio.removeAttribute('src');
      activeAudio.load();
      playBtn.textContent = '▶';
      playBtn.title = '播放';
      playBtn.setAttribute('aria-label', '播放');
      playBtn.disabled = true;
      audioProgress.disabled = true;
      audioProgress.value = 0;
      audioProgress.max = 0;
      audioTime.textContent = '0:00 / 0:00';
      hidePlayhead();
    }

    function loadSelectedAudio() {
      const channel = (state.data?.channels || []).find(item => item.position_id === state.selectedChannel);
      if (!channel?.audio_url) {
        resetAudio();
        return;
      }
      activeAudio.src = channel.audio_url;
      activeAudio.load();
      playBtn.disabled = false;
      audioProgress.disabled = false;
      playBtn.textContent = '▶';
      playBtn.title = '播放';
      playBtn.setAttribute('aria-label', '播放');
    }

    function selectedAnnotation() {
      return (state.data?.annotations || []).find(item => item.id === state.selectedId) || null;
    }

    function currentDuration() {
      return Number(activeAudio.duration || 0);
    }

    function annotationTimeRange(item) {
      const duration = currentDuration();
      if (!item || !duration) return null;
      const left = Math.max(0, Math.min(item.x1, item.x2));
      const right = Math.min(IMAGE_WIDTH, Math.max(item.x1, item.x2));
      const start = left / IMAGE_WIDTH * duration;
      const end = right / IMAGE_WIDTH * duration;
      if (end <= start) return null;
      return { start, end };
    }

    function clearSegmentTimer() {
      if (state.segmentTimer) {
        clearTimeout(state.segmentTimer);
        state.segmentTimer = null;
      }
    }

    function getGain() {
      const value = Number(gainInput.value || 1);
      if (!Number.isFinite(value)) return 1;
      return Math.max(0.01, Math.min(100, value));
    }

    function setupPlaybackGain() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;
      if (!state.playbackContext) state.playbackContext = new AudioContextClass();
      if (!state.playbackSourceNode) {
        state.playbackGainNode = state.playbackContext.createGain();
        state.playbackSourceNode = state.playbackContext.createMediaElementSource(activeAudio);
        state.playbackSourceNode.connect(state.playbackGainNode).connect(state.playbackContext.destination);
      }
      updatePlaybackGain();
    }

    function resumePlaybackContext() {
      setupPlaybackGain();
      if (state.playbackContext?.state === 'suspended') {
        state.playbackContext.resume();
      }
    }

    function updatePlaybackGain() {
      if (!state.playbackGainNode) return;
      const currentTime = state.playbackContext ? state.playbackContext.currentTime : 0;
      state.playbackGainNode.gain.setTargetAtTime(getGain(), currentTime, 0.01);
    }

    function hidePlayhead() {
      playheadLine.classList.add('hidden');
    }

    function updatePlayhead() {
      const duration = currentDuration();
      if (!duration || activeAudio.paused) {
        hidePlayhead();
        return;
      }
      const index = CHANNEL_ORDER.indexOf(state.selectedChannel);
      if (index < 0) {
        hidePlayhead();
        return;
      }
      const leftPercent = Math.max(0, Math.min(100, activeAudio.currentTime / duration * 100));
      playheadLine.style.left = `${leftPercent}%`;
      playheadLine.style.top = `${index / CHANNEL_ORDER.length * 100}%`;
      playheadLine.style.height = `${100 / CHANNEL_ORDER.length}%`;
      playheadLine.classList.remove('hidden');
    }

    function playSelectedAnnotation() {
      const item = selectedAnnotation();
      if (!item || !activeAudio.src) return;
      const playRange = () => {
        const range = annotationTimeRange(item);
        if (!range) return;
        clearSegmentTimer();
        activeAudio.currentTime = range.start;
        resumePlaybackContext();
        activeAudio.play().then(() => {
          playBtn.textContent = '❚❚';
          playBtn.title = '暂停';
          playBtn.setAttribute('aria-label', '暂停');
          updatePlayhead();
          state.segmentTimer = setTimeout(() => {
            activeAudio.pause();
            playBtn.textContent = '▶';
            playBtn.title = '播放';
            playBtn.setAttribute('aria-label', '播放');
            hidePlayhead();
          }, Math.max(20, (range.end - range.start) * 1000));
        }).catch(error => setStatus(error.message, 'bad'));
      };

      if (activeAudio.readyState >= 1) {
        playRange();
      } else {
        activeAudio.addEventListener('loadedmetadata', playRange, { once: true });
      }
    }

    playBtn.addEventListener('click', () => {
      if (!activeAudio.src) return;
      if (activeAudio.paused) {
        playSelectedAnnotation();
      } else {
        clearSegmentTimer();
        activeAudio.pause();
        playBtn.textContent = '▶';
        playBtn.title = '播放';
        playBtn.setAttribute('aria-label', '播放');
        hidePlayhead();
      }
    });

    audioProgress.addEventListener('input', () => {
      clearSegmentTimer();
      activeAudio.currentTime = Number(audioProgress.value || 0);
      updatePlayhead();
    });
    activeAudio.addEventListener('loadedmetadata', updateAudioTime);
    activeAudio.addEventListener('timeupdate', updateAudioTime);
    activeAudio.addEventListener('pause', () => {
      if (activeAudio.currentTime >= currentDuration()) return;
      playBtn.textContent = '▶';
      playBtn.title = '播放';
      playBtn.setAttribute('aria-label', '播放');
      hidePlayhead();
    });
    activeAudio.addEventListener('play', resumePlaybackContext);
    activeAudio.addEventListener('ended', () => {
      clearSegmentTimer();
      playBtn.textContent = '▶';
      playBtn.title = '播放';
      playBtn.setAttribute('aria-label', '播放');
      hidePlayhead();
    });
    gainInput.addEventListener('change', updatePlaybackGain);

    loadOptions().then(loadData).catch(error => setStatus(error.message, 'bad'));
  </script>
</body>
</html>
