<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>标注展示 - TurbineLabelStudio</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header id="siteHeader"></header>
  <main class="page viewer-page">
    <section class="viewer-shell">
      <section class="panel viewer-main-panel">
        <div class="media-layout">
          <div class="audio-progress">
            <button class="secondary icon-button" id="playBtn" title="播放" aria-label="播放" disabled>▶</button>
            <input id="audioProgress" type="range" min="0" max="0" step="0.01" value="0" disabled>
            <span id="audioTime">0:00 / 0:00</span>
            <label class="gain-control">增益
              <select id="gainInput">
                <option value="0.1">0.1</option>
                <option value="0.5">0.5</option>
                <option value="1">1</option>
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="20">20</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </label>
          </div>
          <div class="image-stage" id="imageStage">
            <div class="image-canvas" id="imageCanvas">
              <img id="targetImage" alt="">
              <svg id="boxLayer" viewBox="0 0 1200 1200"></svg>
              <div class="playhead-line hidden" id="playheadLine"></div>
            </div>
            <div class="empty-state" id="emptyImage">暂无图片</div>
          </div>
          <div class="channel-button-panel">
            <div class="channel-button-list" id="channelButtonList"></div>
          </div>
        </div>
        <section class="buc-rail" aria-label="BUC 列表">
          <div class="buc-rail-title">BUC</div>
          <div class="buc-list" id="bucList"></div>
        </section>
        <audio id="activeAudio" preload="metadata"></audio>
      </section>

      <aside class="viewer-side">
        <section class="panel load-panel">
          <label>标签
            <select id="labelFilter"></select>
          </label>
          <select id="bucInput" class="hidden" aria-hidden="true" tabindex="-1"></select>
          <label>方法
            <select id="funcInput"></select>
          </label>
          <div class="edit-mode-toolbar">
            <button class="secondary" id="editModeBtn" type="button">进入编辑模式</button>
            <button class="danger hidden" id="deleteAnnotationBtn" type="button" disabled>删除选中标注</button>
          </div>
          <div class="edit-panel hidden" id="editPanel">
            <label>新增标签
              <select id="editLabelSelect" class="hidden" aria-hidden="true" tabindex="-1"></select>
              <div class="label-dropdown">
                <button class="secondary label-dropdown-button" id="editLabelButton" type="button">请选择标签</button>
                <div class="label-dropdown-menu hidden" id="editLabelMenu"></div>
              </div>
            </label>
          </div>
          <span class="status hidden" id="status"></span>
        </section>
        <section class="panel annotation-panel">
          <div class="side-title">
            <strong>标注结果</strong>
            <div class="annotation-title-tools">
              <select id="annotationJumpSelect" aria-label="切换标注结果" disabled>
                <option value="">暂无标注</option>
              </select>
              <span id="annotationCount">0</span>
            </div>
          </div>
          <div class="annotation-list" id="annotationList"></div>
        </section>
      </aside>
    </section>
  </main>

  <script src="/static/common.js"></script>
  <script>
    requireLogin();
    renderHeader('annotation_view');

    const state = {
      options: [],
      data: null,
      selectedId: null,
      selectedChannel: null,
      segmentTimer: null,
      playbackContext: null,
      playbackSourceNode: null,
      playbackGainNode: null,
      labels: [],
      canEdit: false,
      editMode: false,
      drawStart: null,
      lockHeartbeatTimer: null,
      lockedBuc: null,
      lockedFunc: null
    };

    const statusEl = document.getElementById('status');
    const labelFilter = document.getElementById('labelFilter');
    const bucInput = document.getElementById('bucInput');
    const bucList = document.getElementById('bucList');
    const funcInput = document.getElementById('funcInput');
    const targetImage = document.getElementById('targetImage');
    const imageCanvas = document.getElementById('imageCanvas');
    const boxLayer = document.getElementById('boxLayer');
    const emptyImage = document.getElementById('emptyImage');
    const annotationList = document.getElementById('annotationList');
    const annotationJumpSelect = document.getElementById('annotationJumpSelect');
    const channelButtonList = document.getElementById('channelButtonList');
    const activeAudio = document.getElementById('activeAudio');
    const playBtn = document.getElementById('playBtn');
    const audioProgress = document.getElementById('audioProgress');
    const audioTime = document.getElementById('audioTime');
    const gainInput = document.getElementById('gainInput');
    const playheadLine = document.getElementById('playheadLine');
    const editModeBtn = document.getElementById('editModeBtn');
    const deleteAnnotationBtn = document.getElementById('deleteAnnotationBtn');
    const editPanel = document.getElementById('editPanel');
    const editLabelSelect = document.getElementById('editLabelSelect');
    const editLabelButton = document.getElementById('editLabelButton');
    const editLabelMenu = document.getElementById('editLabelMenu');
    const CHANNEL_ORDER = ['B1A', 'B1B', 'B2A', 'B2B', 'B3A', 'B3B'];
    const IMAGE_WIDTH = 1200;

    function setStatus(text, type = '') {
      statusEl.className = `status ${type}`.trim();
      statusEl.textContent = text;
    }

    function clearStatus() {
      statusEl.className = 'status hidden';
      statusEl.textContent = '';
    }

    function optionHasLabel(item, labelId) {
      if (!labelId) return true;
      return (item.labels || []).some(label => String(label.id) === String(labelId));
    }

    function filteredOptions() {
      return state.options.filter(item => optionHasLabel(item, labelFilter.value));
    }

    function selectedBucOptions() {
      return filteredOptions().filter(item => item.buc === bucInput.value);
    }

    function closeLabelDropdowns() {
      editLabelMenu.classList.add('hidden');
    }

    function setEditLabelValue(value, text) {
      editLabelSelect.value = value;
      editLabelButton.textContent = text || '请选择标签';
      closeLabelDropdowns();
    }

    function renderLabelFilter() {
      const labels = [];
      const seen = new Set();
      for (const item of state.options) {
        for (const label of item.labels || []) {
          if (seen.has(label.id)) continue;
          seen.add(label.id);
          labels.push(label);
        }
      }
      labels.sort((a, b) => a.id - b.id);
      labelFilter.innerHTML = '<option value="">全部标签</option>' + labels
        .map(label => `<option value="${label.id}">${escapeHtml(label.label)}</option>`)
        .join('');
    }

    function renderOptions() {
      const options = filteredOptions();
      const bucs = [...new Set(options.map(item => item.buc))];
      const previousBuc = bucInput.value;
      bucInput.innerHTML = bucs.map(buc => `
        <option value="${escapeHtml(buc)}">${escapeHtml(buc)}</option>
      `).join('');
      if (bucs.includes(previousBuc)) bucInput.value = previousBuc;
      renderFuncOptions();
      renderBucList();
    }

    function renderBucList() {
      const bucs = [...new Set(filteredOptions().map(item => item.buc))];
      const current = bucInput.value;
      bucList.innerHTML = bucs.map(buc => `
        <button
          class="buc-list-item ${buc === current ? 'active' : ''}"
          type="button"
          data-buc="${escapeHtml(buc)}"
        >${escapeHtml(buc)}</button>
      `).join('') || '<div class="empty-list">暂无 BUC</div>';
      bucList.querySelectorAll('.buc-list-item').forEach(node => {
        node.addEventListener('click', () => switchBuc(node.dataset.buc));
      });
    }

    async function switchBuc(buc) {
      if (!buc || bucInput.value === buc) {
        renderBucList();
        return;
      }
      await switchImageSelection(() => {
        bucInput.value = buc;
        renderFuncOptions();
        renderBucList();
      });
    }

    function renderFuncOptions() {
      const options = selectedBucOptions();
      const previousFunc = funcInput.value;
      funcInput.innerHTML = options.map(item => `
        <option value="${escapeHtml(item.func)}">${escapeHtml(item.func)}</option>
      `).join('');
      if (options.some(item => item.func === previousFunc)) funcInput.value = previousFunc;
    }

    function colorFor(item) {
      return item.label_color || '#0f5f8a';
    }

    function renderBoxes() {
      const annotations = state.data?.annotations || [];
      boxLayer.setAttribute('viewBox', '0 0 1200 1200');
      boxLayer.innerHTML = annotations.map(item => {
        const x = Math.min(item.x1, item.x2);
        const y = Math.min(item.y1, item.y2);
        const width = Math.abs(item.x2 - item.x1);
        const height = Math.abs(item.y2 - item.y1);
        const selected = item.id === state.selectedId;
        const color = colorFor(item);
        return `
          <g class="anno-box ${selected ? 'selected' : ''}" data-id="${item.id}">
            <rect x="${x}" y="${y}" width="${width}" height="${height}" style="--box:${escapeHtml(color)}"></rect>
          </g>
        `;
      }).join('');
      renderDraftBox();
      boxLayer.querySelectorAll('.anno-box').forEach(node => {
        node.addEventListener('click', event => {
          event.stopPropagation();
          selectAnnotation(Number(node.dataset.id));
        });
      });
    }

    function renderAnnotationList() {
      const annotations = state.data?.annotations || [];
      document.getElementById('annotationCount').textContent = annotations.length;
      annotationJumpSelect.disabled = !annotations.length;
      annotationJumpSelect.innerHTML = annotations.length
        ? annotations.map((item, index) => {
          const label = item.label || `label_id=${item.label_id}`;
          return `
            <option value="${item.id}" ${item.id === state.selectedId ? 'selected' : ''}>
              ${index + 1}. ${escapeHtml(label)} #${item.id}
            </option>
          `;
        }).join('')
        : '<option value="">暂无标注</option>';
      annotationList.innerHTML = annotations.map(item => {
        const selected = item.id === state.selectedId;
        const label = item.label || `label_id=${item.label_id}`;
        return `
          <button class="annotation-row ${selected ? 'active' : ''}" data-id="${item.id}">
            <span class="swatch" style="--chip:${escapeHtml(colorFor(item))}"></span>
            <span>
              <strong>${escapeHtml(label)}</strong>
              <small>#${item.id} · ${Math.round(item.x1)},${Math.round(item.y1)} - ${Math.round(item.x2)},${Math.round(item.y2)}</small>
            </span>
          </button>
        `;
      }).join('') || '<div class="empty-list">暂无标注</div>';
      annotationList.querySelectorAll('.annotation-row').forEach(node => {
        node.addEventListener('click', () => selectAnnotation(Number(node.dataset.id)));
      });
      deleteAnnotationBtn.disabled = !state.editMode || !state.selectedId;
    }

    function renderEditControls() {
      editModeBtn.textContent = state.editMode ? '退出编辑模式' : '进入编辑模式';
      editModeBtn.classList.toggle('secondary', !state.editMode);
      editPanel.classList.toggle('hidden', !state.editMode);
      deleteAnnotationBtn.classList.toggle('hidden', !state.editMode);
      deleteAnnotationBtn.disabled = !state.editMode || !state.selectedId;
      imageCanvas.classList.toggle('editing', state.editMode);
    }

    function renderEditLabelSelect() {
      editLabelSelect.innerHTML = state.labels.map(item => `
        <option value="${item.id}">${escapeHtml(item.label)}</option>
      `).join('');
      editLabelMenu.innerHTML = state.labels.map(item => `
        <button type="button" class="label-dropdown-option" data-value="${item.id}" data-text="${escapeHtml(item.label)}">
          ${escapeHtml(item.label)}
        </button>
      `).join('');
      const first = state.labels[0];
      setEditLabelValue(first?.id || '', first?.label || '请选择标签');
    }

    function renderChannels() {
      const channels = state.data?.channels || [];
      if (!state.selectedChannel || !channels.some(item => item.position_id === state.selectedChannel && item.audio_url)) {
        state.selectedChannel = channels.find(item => item.audio_url)?.position_id || null;
      }
      channelButtonList.innerHTML = channels.map(item => `
        <button
          class="channel-button ${item.position_id === state.selectedChannel ? 'active' : ''}"
          data-position="${escapeHtml(item.position_id)}"
          ${item.audio_url ? '' : 'disabled'}
        >${escapeHtml(item.position_id)}</button>
      `).join('');
      channelButtonList.querySelectorAll('.channel-button').forEach(node => {
        node.addEventListener('click', () => playSelectedAnnotationByChannel(node.dataset.position));
      });
      loadSelectedAudio();
    }

    function channelFromPointer(event) {
      if (!event) return null;
      const rect = imageCanvas.getBoundingClientRect();
      if (!rect.height) return null;
      const y = Math.max(0, Math.min(rect.height - 1, event.clientY - rect.top));
      const index = Math.max(0, Math.min(CHANNEL_ORDER.length - 1, Math.floor(y / rect.height * CHANNEL_ORDER.length)));
      return CHANNEL_ORDER[index];
    }

    function markSelectedChannel() {
      channelButtonList.querySelectorAll('.channel-button').forEach(row => {
        row.classList.toggle('active', row.dataset.position === state.selectedChannel);
      });
    }

    function selectAnnotation(id, options = {}) {
      state.selectedId = id;
      renderBoxes();
      renderAnnotationList();
      const row = annotationList.querySelector(`[data-id="${id}"]`);
      if (row) row.scrollIntoView({ block: 'nearest' });
      if (options.autoPlay) playSelectedAnnotation();
    }

    function playSelectedAnnotationAtPointer(event) {
      if (!state.selectedId) return;
      const channel = channelFromPointer(event);
      playSelectedAnnotationByChannel(channel);
    }

    function playSelectedAnnotationByChannel(channel) {
      if (!state.selectedId) return;
      if (!channel || !(state.data?.channels || []).some(item => item.position_id === channel && item.audio_url)) return;
      state.selectedChannel = channel;
      markSelectedChannel();
      loadSelectedAudio();
      playSelectedAnnotation();
    }

    async function loadOptions() {
      const data = await apiFetch('/api/annotation-view/options');
      state.options = data.items || [];
      renderLabelFilter();
      renderOptions();
      const options = selectedBucOptions();
      if (options.length) funcInput.value = options[0].func;
      clearStatus();
    }

    async function loadPermissions() {
      const data = await apiFetch('/api/permissions');
      setUser(data.user, data.permissions);
      state.canEdit = !!data.permissions?.label_write;
      renderEditControls();
    }

    async function loadLabelsForEdit() {
      const data = await apiFetch('/api/labels');
      state.labels = data.items || [];
      renderEditLabelSelect();
    }

    function selectedOption() {
      return selectedBucOptions().find(item => item.func === funcInput.value) || null;
    }

    function currentLockPayload() {
      const option = selectedOption();
      if (!option) return null;
      return { buc: option.buc, func: option.func };
    }

    function stopLockHeartbeat() {
      if (state.lockHeartbeatTimer) {
        clearInterval(state.lockHeartbeatTimer);
        state.lockHeartbeatTimer = null;
      }
    }

    function startLockHeartbeat() {
      stopLockHeartbeat();
      state.lockHeartbeatTimer = setInterval(async () => {
        if (!state.editMode || !state.lockedBuc || !state.lockedFunc) return;
        try {
          await apiFetch('/api/annotation-lock/heartbeat', {
            method: 'POST',
            body: JSON.stringify({ buc: state.lockedBuc, func: state.lockedFunc })
          });
        } catch (error) {
          state.editMode = false;
          state.drawStart = null;
          state.lockedBuc = null;
          state.lockedFunc = null;
          stopLockHeartbeat();
          renderBoxes();
          renderEditControls();
          setStatus(error.message, 'bad');
        }
      }, 60000);
    }

    async function lockCurrentImage() {
      const payload = currentLockPayload();
      if (!payload) throw new Error('请选择 BUC');
      await apiFetch('/api/annotation-lock/lock', {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      state.lockedBuc = payload.buc;
      state.lockedFunc = payload.func;
      startLockHeartbeat();
    }

    async function unlockCurrentImage() {
      stopLockHeartbeat();
      if (!state.lockedBuc || !state.lockedFunc) return;
      const payload = { buc: state.lockedBuc, func: state.lockedFunc };
      state.lockedBuc = null;
      state.lockedFunc = null;
      try {
        await apiFetch('/api/annotation-lock/unlock', {
          method: 'POST',
          body: JSON.stringify(payload)
        });
      } catch (error) {
        setStatus(error.message, 'bad');
      }
    }

    async function leaveEditMode() {
      if (!state.editMode && !state.lockedBuc) return;
      state.editMode = false;
      state.drawStart = null;
      await unlockCurrentImage();
      renderBoxes();
      renderEditControls();
    }

    async function loadData() {
      const option = selectedOption();
      const buc = option?.buc;
      const funcName = option?.func;
      if (!buc || !funcName) {
        setStatus('请选择 BUC', 'bad');
        return false;
      }
      clearStatus();
      try {
        const data = await apiFetch(`/api/annotation-view/data?buc=${encodeURIComponent(buc)}&func=${encodeURIComponent(funcName)}`);
        state.data = data;
        state.selectedId = data.annotations[0]?.id || null;
        state.selectedChannel = data.channels.find(item => item.audio_url)?.position_id || null;
        resetAudio();
        targetImage.src = data.image_url;
        emptyImage.classList.add('hidden');
        renderAnnotationList();
        renderChannels();
        renderEditControls();
        clearStatus();
        return true;
      } catch (error) {
        setStatus(error.message, 'bad');
        return false;
      }
    }

    async function switchImageSelection(updateSelection) {
      const keepEditMode = state.editMode;
      if (keepEditMode) {
        state.drawStart = null;
        await unlockCurrentImage();
      } else {
        await leaveEditMode();
      }

      updateSelection();
      const loaded = await loadData();
      if (!keepEditMode) return;

      if (!loaded) {
        state.editMode = false;
        renderBoxes();
        renderEditControls();
        return;
      }

      try {
        await lockCurrentImage();
        state.editMode = true;
        setStatus('已切换图片并保持编辑模式', 'ok');
      } catch (error) {
        state.editMode = false;
        state.drawStart = null;
        setStatus(error.message, 'bad');
      }
      renderBoxes();
      renderEditControls();
    }

    function isLockConflictError(error) {
      return String(error?.message || '').includes('已被') && String(error?.message || '').includes('锁定');
    }

    async function moveOption(delta) {
      const bucs = [...new Set(filteredOptions().map(item => item.buc))];
      if (!bucs.length) return;
      const current = bucs.indexOf(bucInput.value);
      if (!state.editMode) {
        const nextIndex = current < 0
          ? (delta > 0 ? 0 : bucs.length - 1)
          : (current + delta + bucs.length) % bucs.length;
        await switchImageSelection(() => {
          bucInput.value = bucs[nextIndex];
          renderFuncOptions();
          renderBucList();
        });
        return;
      }

      const originalBuc = bucInput.value;
      const originalFunc = funcInput.value;
      state.drawStart = null;
      await unlockCurrentImage();

      const candidateCount = current < 0 ? bucs.length : Math.max(bucs.length - 1, 0);
      for (let step = 1; step <= candidateCount; step += 1) {
        const baseIndex = current < 0 ? (delta > 0 ? -1 : bucs.length) : current;
        const nextIndex = (baseIndex + delta * step + bucs.length) % bucs.length;
        bucInput.value = bucs[nextIndex];
        renderFuncOptions();
        renderBucList();

        try {
          await lockCurrentImage();
          const loaded = await loadData();
          if (!loaded) {
            await unlockCurrentImage();
            state.editMode = false;
            renderBoxes();
            renderEditControls();
            return;
          }
          state.editMode = true;
          setStatus(step > 1 ? '已跳过被其他人锁定的图片，并保持编辑模式' : '已切换图片并保持编辑模式', 'ok');
          renderBoxes();
          renderEditControls();
          return;
        } catch (error) {
          if (isLockConflictError(error) && step < candidateCount) continue;
          break;
        }
      }

      bucInput.value = originalBuc;
      renderFuncOptions();
      if (originalFunc && [...funcInput.options].some(item => item.value === originalFunc)) {
        funcInput.value = originalFunc;
      }
      renderBucList();
      await loadData();
      try {
        await lockCurrentImage();
        state.editMode = true;
        setStatus('后面没有可编辑的未锁定图片，已停留在当前图片', 'bad');
      } catch (error) {
        state.editMode = false;
        state.drawStart = null;
        setStatus(error.message, 'bad');
      }
      renderBoxes();
      renderEditControls();
    }

    targetImage.addEventListener('load', () => {
      if (targetImage.naturalWidth !== 1200 || targetImage.naturalHeight !== 1200) {
        setStatus(`图片尺寸为 ${targetImage.naturalWidth}×${targetImage.naturalHeight}，标注层仍按 1200×1200 坐标显示`, 'bad');
      }
      renderBoxes();
    });

    targetImage.addEventListener('error', () => {
      boxLayer.innerHTML = '';
      emptyImage.classList.remove('hidden');
      setStatus('图片加载失败', 'bad');
    });

    editLabelButton.addEventListener('click', event => {
      event.stopPropagation();
      editLabelMenu.classList.toggle('hidden');
    });
    labelFilter.addEventListener('change', async () => {
      await leaveEditMode();
      renderOptions();
      const options = selectedBucOptions();
      if (options.length) {
        funcInput.value = options[0].func;
        loadData();
      } else {
        bucInput.innerHTML = '';
        funcInput.innerHTML = '';
        renderBucList();
      }
    });
    editLabelMenu.addEventListener('click', event => {
      const option = event.target.closest('.label-dropdown-option');
      if (!option) return;
      setEditLabelValue(option.dataset.value || '', option.dataset.text || '请选择标签');
    });
    document.addEventListener('click', closeLabelDropdowns);
    bucInput.addEventListener('change', async () => {
      await switchImageSelection(() => {
        renderFuncOptions();
        renderBucList();
      });
    });
    funcInput.addEventListener('change', async () => {
      await switchImageSelection(() => {});
    });
    annotationJumpSelect.addEventListener('change', () => {
      const id = Number(annotationJumpSelect.value);
      if (id) selectAnnotation(id);
    });
    imageCanvas.addEventListener('click', event => {
      if (state.editMode) return;
      playSelectedAnnotationAtPointer(event);
    });
    document.addEventListener('keydown', event => {
      const tag = event.target?.tagName;
      if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
      if (event.key === 'a' || event.key === 'A') {
        event.preventDefault();
        moveOption(-1);
      }
      if (event.key === 'd' || event.key === 'D') {
        event.preventDefault();
        moveOption(1);
      }
    });

    function pointFromEvent(event) {
      const rect = boxLayer.getBoundingClientRect();
      const x = (event.clientX - rect.left) / rect.width * IMAGE_WIDTH;
      const y = (event.clientY - rect.top) / rect.height * IMAGE_WIDTH;
      return {
        x: Math.max(0, Math.min(IMAGE_WIDTH, x)),
        y: Math.max(0, Math.min(IMAGE_WIDTH, y))
      };
    }

    function draftRect() {
      if (!state.drawStart?.current) return null;
      const { start, current } = state.drawStart;
      const x1 = Math.min(start.x, current.x);
      const y1 = Math.min(start.y, current.y);
      const x2 = Math.max(start.x, current.x);
      const y2 = Math.max(start.y, current.y);
      return { x1, y1, x2, y2, width: x2 - x1, height: y2 - y1 };
    }

    function renderDraftBox() {
      const rect = draftRect();
      if (!rect) return;
      boxLayer.insertAdjacentHTML('beforeend', `
        <g class="anno-box draft-box">
          <rect x="${rect.x1}" y="${rect.y1}" width="${rect.width}" height="${rect.height}"></rect>
        </g>
      `);
    }

    async function createAnnotationFromDraft() {
      const option = selectedOption();
      const rect = draftRect();
      const labelId = Number(editLabelSelect.value);
      state.drawStart = null;
      renderBoxes();
      if (!option || !rect || !labelId) return;
      if (rect.width < 4 || rect.height < 4) return;
      try {
        await apiFetch('/api/annotations', {
          method: 'POST',
          body: JSON.stringify({
            buc: option.buc,
            func: option.func,
            x1: Math.round(rect.x1),
            y1: Math.round(rect.y1),
            x2: Math.round(rect.x2),
            y2: Math.round(rect.y2),
            label_id: labelId
          })
        });
        await loadData();
        setStatus('新增标注成功', 'ok');
      } catch (error) {
        setStatus(error.message, 'bad');
      }
    }

    editModeBtn.addEventListener('click', async () => {
      if (!state.editMode) {
        try {
          await loadPermissions();
          if (!state.canEdit) {
            setStatus('当前角色没有权限', 'bad');
            return;
          }
          if (!state.labels.length) await loadLabelsForEdit();
          await lockCurrentImage();
          state.editMode = true;
          setStatus('已进入编辑模式，当前图片锁定 5 分钟，编辑中会自动续锁', 'ok');
        } catch (error) {
          setStatus(error.message, 'bad');
          return;
        }
      } else {
        await leaveEditMode();
        setStatus('已退出编辑模式', 'ok');
        return;
      }
      renderEditControls();
    });

    deleteAnnotationBtn.addEventListener('click', async () => {
      if (!state.editMode || !state.selectedId) return;
      if (!confirm('确认删除选中的标注？')) return;
      try {
        await apiFetch(`/api/annotations/${state.selectedId}`, { method: 'DELETE' });
        state.selectedId = null;
        await loadData();
        setStatus('删除标注成功', 'ok');
      } catch (error) {
        setStatus(error.message, 'bad');
      }
    });

    boxLayer.addEventListener('pointerdown', event => {
      if (!state.editMode || !state.canEdit || !editLabelSelect.value) return;
      if (event.target.closest('.anno-box')) return;
      event.preventDefault();
      const point = pointFromEvent(event);
      state.drawStart = { start: point, current: point };
      boxLayer.setPointerCapture(event.pointerId);
      renderBoxes();
    });

    boxLayer.addEventListener('pointermove', event => {
      if (!state.drawStart) return;
      state.drawStart.current = pointFromEvent(event);
      renderBoxes();
    });

    boxLayer.addEventListener('pointerup', async event => {
      if (!state.drawStart) return;
      state.drawStart.current = pointFromEvent(event);
      boxLayer.releasePointerCapture(event.pointerId);
      await createAnnotationFromDraft();
    });

    boxLayer.addEventListener('pointercancel', () => {
      state.drawStart = null;
      renderBoxes();
    });

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds <= 0) return '0:00';
      const minutes = Math.floor(seconds / 60);
      const remain = Math.floor(seconds % 60).toString().padStart(2, '0');
      return `${minutes}:${remain}`;
    }

    function updateAudioTime() {
      const duration = activeAudio.duration || 0;
      audioProgress.max = duration || 0;
      audioProgress.value = activeAudio.currentTime || 0;
      audioTime.textContent = `${formatTime(activeAudio.currentTime)} / ${formatTime(duration)}`;
      updatePlayhead();
    }

    function resetAudio() {
      clearSegmentTimer();
      activeAudio.pause();
      activeAudio.removeAttribute('src');
      activeAudio.load();
      playBtn.textContent = '▶';
      playBtn.title = '播放';
      playBtn.setAttribute('aria-label', '播放');
      playBtn.disabled = true;
      audioProgress.disabled = true;
      audioProgress.value = 0;
      audioProgress.max = 0;
      audioTime.textContent = '0:00 / 0:00';
      hidePlayhead();
    }

    function loadSelectedAudio() {
      const channel = (state.data?.channels || []).find(item => item.position_id === state.selectedChannel);
      if (!channel?.audio_url) {
        resetAudio();
        return;
      }
      activeAudio.src = channel.audio_url;
      activeAudio.load();
      playBtn.disabled = false;
      audioProgress.disabled = false;
      playBtn.textContent = '▶';
      playBtn.title = '播放';
      playBtn.setAttribute('aria-label', '播放');
    }

    function selectedAnnotation() {
      return (state.data?.annotations || []).find(item => item.id === state.selectedId) || null;
    }

    function currentDuration() {
      return Number(activeAudio.duration || 0);
    }

    function annotationTimeRange(item) {
      const duration = currentDuration();
      if (!item || !duration) return null;
      const left = Math.max(0, Math.min(item.x1, item.x2));
      const right = Math.min(IMAGE_WIDTH, Math.max(item.x1, item.x2));
      const start = left / IMAGE_WIDTH * duration;
      const end = right / IMAGE_WIDTH * duration;
      if (end <= start) return null;
      return { start, end };
    }

    function clearSegmentTimer() {
      if (state.segmentTimer) {
        clearTimeout(state.segmentTimer);
        state.segmentTimer = null;
      }
    }

    function getGain() {
      const value = Number(gainInput.value || 1);
      if (!Number.isFinite(value)) return 1;
      return Math.max(0.01, Math.min(100, value));
    }

    function setupPlaybackGain() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;
      if (!state.playbackContext) state.playbackContext = new AudioContextClass();
      if (!state.playbackSourceNode) {
        state.playbackGainNode = state.playbackContext.createGain();
        state.playbackSourceNode = state.playbackContext.createMediaElementSource(activeAudio);
        state.playbackSourceNode.connect(state.playbackGainNode).connect(state.playbackContext.destination);
      }
      updatePlaybackGain();
    }

    function resumePlaybackContext() {
      setupPlaybackGain();
      if (state.playbackContext?.state === 'suspended') {
        state.playbackContext.resume();
      }
    }

    function updatePlaybackGain() {
      if (!state.playbackGainNode) return;
      const currentTime = state.playbackContext ? state.playbackContext.currentTime : 0;
      state.playbackGainNode.gain.setTargetAtTime(getGain(), currentTime, 0.01);
    }

    function hidePlayhead() {
      playheadLine.classList.add('hidden');
    }

    function updatePlayhead() {
      const duration = currentDuration();
      if (!duration || activeAudio.paused) {
        hidePlayhead();
        return;
      }
      const index = CHANNEL_ORDER.indexOf(state.selectedChannel);
      if (index < 0) {
        hidePlayhead();
        return;
      }
      const leftPercent = Math.max(0, Math.min(100, activeAudio.currentTime / duration * 100));
      playheadLine.style.left = `${leftPercent}%`;
      playheadLine.style.top = `${index / CHANNEL_ORDER.length * 100}%`;
      playheadLine.style.height = `${100 / CHANNEL_ORDER.length}%`;
      playheadLine.classList.remove('hidden');
    }

    function playSelectedAnnotation() {
      const item = selectedAnnotation();
      if (!item || !activeAudio.src) return;
      const playRange = () => {
        const range = annotationTimeRange(item);
        if (!range) return;
        clearSegmentTimer();
        activeAudio.currentTime = range.start;
        resumePlaybackContext();
        activeAudio.play().then(() => {
          playBtn.textContent = '❚❚';
          playBtn.title = '暂停';
          playBtn.setAttribute('aria-label', '暂停');
          updatePlayhead();
          state.segmentTimer = setTimeout(() => {
            activeAudio.pause();
            playBtn.textContent = '▶';
            playBtn.title = '播放';
            playBtn.setAttribute('aria-label', '播放');
            hidePlayhead();
          }, Math.max(20, (range.end - range.start) * 1000));
        }).catch(error => setStatus(error.message, 'bad'));
      };

      if (activeAudio.readyState >= 1) {
        playRange();
      } else {
        activeAudio.addEventListener('loadedmetadata', playRange, { once: true });
      }
    }

    playBtn.addEventListener('click', () => {
      if (!activeAudio.src) return;
      if (activeAudio.paused) {
        playSelectedAnnotation();
      } else {
        clearSegmentTimer();
        activeAudio.pause();
        playBtn.textContent = '▶';
        playBtn.title = '播放';
        playBtn.setAttribute('aria-label', '播放');
        hidePlayhead();
      }
    });

    audioProgress.addEventListener('input', () => {
      clearSegmentTimer();
      activeAudio.currentTime = Number(audioProgress.value || 0);
      updatePlayhead();
    });
    activeAudio.addEventListener('loadedmetadata', updateAudioTime);
    activeAudio.addEventListener('timeupdate', updateAudioTime);
    activeAudio.addEventListener('pause', () => {
      if (activeAudio.currentTime >= currentDuration()) return;
      playBtn.textContent = '▶';
      playBtn.title = '播放';
      playBtn.setAttribute('aria-label', '播放');
      hidePlayhead();
    });
    activeAudio.addEventListener('play', resumePlaybackContext);
    activeAudio.addEventListener('ended', () => {
      clearSegmentTimer();
      playBtn.textContent = '▶';
      playBtn.title = '播放';
      playBtn.setAttribute('aria-label', '播放');
      hidePlayhead();
    });
    gainInput.addEventListener('change', updatePlaybackGain);
    window.addEventListener('beforeunload', () => {
      if (!state.lockedBuc || !state.lockedFunc) return;
      const user = getUser();
      const sessionId = localStorage.getItem('tls_session_id');
      fetch('/api/annotation-lock/unlock', {
        method: 'POST',
        keepalive: true,
        headers: {
          'Content-Type': 'application/json',
          'X-User-Id': user?.id || '',
          'X-Session-Id': sessionId || ''
        },
        body: JSON.stringify({ buc: state.lockedBuc, func: state.lockedFunc })
      });
    });

    Promise.all([loadPermissions(), loadOptions()])
      .then(loadData)
      .catch(error => setStatus(error.message, 'bad'));
  </script>
</body>
</html>
