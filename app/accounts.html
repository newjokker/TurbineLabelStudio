<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>权限管理 - TurbineLabelStudio</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header id="siteHeader"></header>
  <main class="page">
    <section class="panel">
      <div class="page-head">
        <div class="page-title">
          <strong>权限管理</strong>
          <span>查看账号角色、个人权限和启用状态；拥有账号管理权限的人可以实时配置。</span>
          <p class="muted" id="permissionText"></p>
        </div>
      </div>
      <form class="form-grid" id="accountForm">
        <input type="hidden" id="accountId">
        <label>账号 <input id="name" placeholder="登录账号" required></label>
        <label>密码 <input id="password" placeholder="编辑时留空表示不修改"></label>
        <label>昵称 <input id="alias" placeholder="页面显示名称"></label>
        <label>角色
          <select id="role">
            <option value="观察者">观察者</option>
            <option value="编辑者">编辑者</option>
            <option value="管理员">管理员</option>
          </select>
        </label>
        <label class="wide">停用时间 <input id="endTime" placeholder="YYYY-MM-DD HH:MM:SS"></label>
        <button type="submit">保存账号及权限</button>
        <button class="secondary" type="button" id="resetBtn">清空</button>
        <div class="permission-editor full">
          <div class="permission-editor-head">
            <div>
              <strong>个人权限</strong>
              <span>选择角色会载入默认模板，下面的权限可以继续单独调整。</span>
            </div>
            <button class="secondary" id="applyRolePresetBtn" type="button">恢复角色默认权限</button>
          </div>
          <div class="permission-grid" id="permissionOptions"></div>
        </div>
      </form>
      <div class="toolbar"><span class="status" id="status">加载中...</span></div>
    </section>
    <section class="panel">
      <table>
        <thead>
          <tr><th>账号</th><th>角色</th><th>已启用权限</th><th>状态</th><th>操作</th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </main>
  <script src="/static/common.js"></script>
  <script>
    requireLogin();
    let accounts = [];
    let permissionCatalog = { items: [], role_presets: {}, dependencies: {} };
    renderHeader('accounts');
    renderPermissionText(document.getElementById('permissionText'));

    function canManage() { return hasPermission('account_manage'); }

    function roleClass(role) {
      if (role === '管理员') return 'admin';
      if (role === '编辑者') return 'editor';
      return '';
    }

    function renderPermissionOptions(permissions = {}) {
      const container = document.getElementById('permissionOptions');
      container.innerHTML = permissionCatalog.items.map(item => `
        <label class="permission-option">
          <input type="checkbox" data-permission="${escapeHtml(item.key)}" ${permissions[item.key] ? 'checked' : ''}>
          <span><strong>${escapeHtml(item.name)}</strong><small>${escapeHtml(item.group)} · ${escapeHtml(item.description)}</small></span>
        </label>
      `).join('');
    }

    function applyRolePreset() {
      const role = document.getElementById('role').value;
      renderPermissionOptions(permissionCatalog.role_presets[role] || {});
    }

    function collectPermissions() {
      return Object.fromEntries(permissionCatalog.items.map(item => [
        item.key,
        !!document.querySelector(`[data-permission="${item.key}"]`)?.checked
      ]));
    }

    function handlePermissionDependency(event) {
      const input = event.target.closest('[data-permission]');
      if (!input) return;
      const key = input.dataset.permission;
      if (input.checked) {
        (permissionCatalog.dependencies[key] || []).forEach(dependency => {
          const target = document.querySelector(`[data-permission="${dependency}"]`);
          if (target) target.checked = true;
        });
      } else {
        Object.entries(permissionCatalog.dependencies).forEach(([permission, dependencies]) => {
          if (dependencies.includes(key)) {
            const target = document.querySelector(`[data-permission="${permission}"]`);
            if (target) target.checked = false;
          }
        });
      }
    }

    function resetForm() {
      document.getElementById('accountId').value = '';
      document.getElementById('name').value = '';
      document.getElementById('password').value = '';
      document.getElementById('alias').value = '';
      document.getElementById('role').value = '观察者';
      document.getElementById('endTime').value = '';
      applyRolePreset();
    }

    function renderRows() {
      document.getElementById('accountForm').classList.toggle('hidden', !canManage());
      document.getElementById('rows').innerHTML = accounts.map(item => {
        const permissionNames = permissionCatalog.items
          .filter(permission => item.permissions?.[permission.key])
          .map(permission => permission.name);
        return `
        <tr>
          <td>
            <div class="identity-cell">
              <strong>${escapeHtml(item.alias || item.name)}</strong>
              <small>${escapeHtml(item.name)} · ID ${item.id}</small>
            </div>
          </td>
          <td><span class="role-chip ${roleClass(item.role)}">${escapeHtml(item.role)}</span></td>
          <td><div class="chip-list">${permissionNames.map(name => `<span class="tag-chip">${escapeHtml(name)}</span>`).join('') || '<span class="muted">无</span>'}</div></td>
          <td>
            ${item.end_time
              ? `<span class="metric-chip warn">已停用 ${escapeHtml(item.end_time)}</span>`
              : '<span class="metric-chip good">启用中</span>'}
          </td>
          <td><div class="row-actions">
            <button class="secondary" data-edit="${item.id}" ${canManage() ? '' : 'disabled'}>配置权限</button>
            <button class="danger" data-disable="${item.id}" ${canManage() ? '' : 'disabled'}>停用</button>
            <button class="danger" data-delete="${item.id}" ${canManage() ? '' : 'disabled'}>删除</button>
          </div></td>
        </tr>
      `;
      }).join('') || '<tr><td colspan="5" class="empty-table">暂无账号</td></tr>';
    }

    async function loadAccounts() {
      const status = document.getElementById('status');
      try {
        const data = await apiFetch('/api/accounts');
        accounts = data.items;
        permissionCatalog = data.permission_catalog || permissionCatalog;
        if (!document.getElementById('accountId').value) applyRolePreset();
        status.className = 'status ok';
        status.textContent = `已加载 ${accounts.length} 个账号`;
        renderRows();
      } catch (error) {
        status.className = 'status bad';
        status.textContent = error.message;
      }
    }

    document.getElementById('accountForm').addEventListener('submit', async event => {
      event.preventDefault();
      const id = document.getElementById('accountId').value;
      const payload = {
        name: document.getElementById('name').value.trim(),
        password: document.getElementById('password').value,
        alias: document.getElementById('alias').value.trim(),
        role: document.getElementById('role').value,
        end_time: document.getElementById('endTime').value.trim(),
        permissions: collectPermissions()
      };
      try {
        await apiFetch(id ? `/api/accounts/${id}` : '/api/accounts', {
          method: id ? 'PUT' : 'POST',
          body: JSON.stringify(payload)
        });
        const editingSelf = Number(id) === Number(getUser()?.id);
        resetForm();
        await loadAccounts();
        if (editingSelf) await refreshPermissions();
      } catch (error) {
        document.getElementById('status').className = 'status bad';
        document.getElementById('status').textContent = error.message;
      }
    });

    document.getElementById('resetBtn').addEventListener('click', resetForm);
    document.getElementById('role').addEventListener('change', applyRolePreset);
    document.getElementById('applyRolePresetBtn').addEventListener('click', applyRolePreset);
    document.getElementById('permissionOptions').addEventListener('change', handlePermissionDependency);

    document.getElementById('rows').addEventListener('click', async event => {
      const editId = Number(event.target.dataset.edit);
      const disableId = Number(event.target.dataset.disable);
      const deleteId = Number(event.target.dataset.delete);
      if (editId) {
        const item = accounts.find(row => row.id === editId);
        document.getElementById('accountId').value = item.id;
        document.getElementById('name').value = item.name;
        document.getElementById('password').value = '';
        document.getElementById('alias').value = item.alias || '';
        document.getElementById('role').value = item.role;
        document.getElementById('endTime').value = item.end_time || '';
        renderPermissionOptions(item.permissions || {});
        document.getElementById('status').className = 'status ok';
        document.getElementById('status').textContent = `正在配置 ${item.alias || item.name} 的个人权限`;
        document.getElementById('accountForm').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      if (disableId && confirm('确认停用这个账号？')) {
        try {
          await apiFetch(`/api/accounts/${disableId}/disable`, { method: 'POST' });
          await loadAccounts();
        } catch (error) {
          document.getElementById('status').className = 'status bad';
          document.getElementById('status').textContent = error.message;
        }
      }
      if (deleteId && confirm('确认删除这个账号？\n\n账号会立即失效并从列表移除，历史标注和操作日志会继续保留。')) {
        try {
          await apiFetch(`/api/accounts/${deleteId}`, { method: 'DELETE' });
          if (Number(document.getElementById('accountId').value) === deleteId) resetForm();
          await loadAccounts();
          document.getElementById('status').className = 'status ok';
          document.getElementById('status').textContent = '账号已删除';
        } catch (error) {
          document.getElementById('status').className = 'status bad';
          document.getElementById('status').textContent = error.message;
        }
      }
    });

    refreshPermissions()
      .then(() => {
        renderPermissionText(document.getElementById('permissionText'));
        resetForm();
        return loadAccounts();
      })
      .catch(error => {
        document.getElementById('status').className = 'status bad';
        document.getElementById('status').textContent = error.message;
      });
  </script>
</body>
</html>
