<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数据集管理 - TurbineLabelStudio</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header id="siteHeader"></header>
  <main class="page">
    <section class="panel">
      <div class="page-head">
        <div class="page-title">
          <strong>数据集管理</strong>
          <span>新增或删除数据集</span>
          <p class="muted" id="permissionText"></p>
        </div>
      </div>
      <form class="form-grid" id="datasetForm">
        <label>名称 <input id="datasetName" placeholder="例如 for_ldq" required></label>
        <button type="submit" id="saveBtn">保存</button>
        <button class="secondary" type="button" id="resetBtn">清空</button>
        <label class="wide">说明 <textarea id="datasetDes" placeholder="说明这个数据集给谁使用、标注什么内容、筛选什么范围"></textarea></label>
      </form>
      <div class="toolbar"><span class="status" id="status">加载中...</span></div>
    </section>
    <section class="panel">
      <table>
        <thead>
          <tr><th>ID</th><th>名称</th><th>说明</th><th>BUC 数量</th><th>操作</th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </main>
  <script src="/static/common.js"></script>
  <script>
    requireLogin();
    let datasets = [];
    renderHeader('datasets');
    renderPermissionText(document.getElementById('permissionText'));

    function canManage() { return hasPermission('dataset_manage'); }

    function resetForm() {
      document.getElementById('datasetName').value = '';
      document.getElementById('datasetDes').value = '';
    }

    function renderRows() {
      document.getElementById('datasetForm').classList.toggle('hidden', !canManage());
      document.getElementById('rows').innerHTML = datasets.map(item => {
        const bucs = item.bucs || [];
        return `
          <tr>
            <td><code>${item.id}</code></td>
            <td>
              <div class="identity-cell">
                <strong>${escapeHtml(item.name)}</strong>
              </div>
            </td>
            <td><div class="desc-cell"><span>${escapeHtml(item.des || '暂无说明')}</span></div></td>
            <td><span class="metric-chip">${bucs.length} 个 BUC</span></td>
            <td><div class="row-actions">
              <button class="danger" data-delete="${item.id}" ${canManage() ? '' : 'disabled'}>删除</button>
            </div></td>
          </tr>
        `;
      }).join('') || '<tr><td colspan="5" class="empty-table">暂无数据集</td></tr>';
    }

    async function loadDatasets() {
      const status = document.getElementById('status');
      try {
        const data = await apiFetch('/api/datasets');
        datasets = data.items || [];
        renderRows();
        status.className = 'status ok';
        status.textContent = `已加载 ${datasets.length} 个数据集`;
      } catch (error) {
        status.className = 'status bad';
        status.textContent = error.message;
      }
    }

    document.getElementById('resetBtn').addEventListener('click', resetForm);

    document.getElementById('datasetForm').addEventListener('submit', async event => {
      event.preventDefault();
      const status = document.getElementById('status');
      const payload = {
        name: document.getElementById('datasetName').value.trim(),
        des: document.getElementById('datasetDes').value.trim()
      };
      try {
        await apiFetch('/api/datasets', {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        resetForm();
        await loadDatasets();
      } catch (error) {
        status.className = 'status bad';
        status.textContent = error.message;
      }
    });

    document.getElementById('rows').addEventListener('click', async event => {
      const deleteId = Number(event.target.dataset.delete);
      if (deleteId && confirm('确认删除这个数据集？')) {
        try {
          await apiFetch(`/api/datasets/${deleteId}`, { method: 'DELETE' });
          await loadDatasets();
        } catch (error) {
          document.getElementById('status').className = 'status bad';
          document.getElementById('status').textContent = error.message;
        }
      }
    });

    refreshPermissions()
      .then(() => {
        renderPermissionText(document.getElementById('permissionText'));
        resetForm();
        return loadDatasets();
      })
      .catch(error => {
        document.getElementById('status').className = 'status bad';
        document.getElementById('status').textContent = error.message;
      });
  </script>
</body>
</html>
