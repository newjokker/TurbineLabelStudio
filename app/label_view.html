<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>标签查看 - TurbineLabelStudio</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header id="siteHeader"></header>
  <main class="page">
    <section class="panel">
      <div class="page-head">
        <div class="page-title">
          <strong>标签查看</strong>
          <span>查看每个标签的含义、用途说明、颜色和维护信息。</span>
          <p class="muted" id="permissionText"></p>
        </div>
        <div class="page-tools">
          <span class="status" id="status">加载中...</span>
        </div>
      </div>
    </section>
    <section class="panel">
      <table>
        <thead>
          <tr>
            <th>标签</th>
            <th>用途说明</th>
            <th>更新人</th>
            <th>更新时间</th>
            <th>extra_info</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </main>
  <script src="/static/common.js"></script>
  <script>
    requireLogin();
    renderHeader('label_view');
    renderPermissionText(document.getElementById('permissionText'));

    function labelPurpose(item) {
      return item.des?.trim() || '';
    }

    async function loadLabels() {
      const status = document.getElementById('status');
      try {
        const data = await apiFetch('/api/labels');
        const labels = data.items;
        document.getElementById('rows').innerHTML = labels.map(item => {
          const color = item.extra_info?.color || '#94a3b8';
          return `
            <tr>
              <td>
                <div class="label-cell">
                  <strong><span class="swatch" style="--chip:${escapeHtml(color)}"></span>${escapeHtml(item.label)}</strong>
                  <small>ID ${item.id}</small>
                </div>
              </td>
              <td><div class="desc-cell"><span>${escapeHtml(labelPurpose(item))}</span></div></td>
              <td>${escapeHtml(item.update_by || '')}</td>
              <td>${escapeHtml(item.update_time || '')}</td>
              <td><code>${escapeHtml(JSON.stringify(item.extra_info || {}))}</code></td>
            </tr>
          `;
        }).join('') || '<tr><td colspan="5" class="empty-table">暂无标签</td></tr>';
        status.className = 'status ok';
        status.textContent = `已加载 ${labels.length} 个标签`;
      } catch (error) {
        status.className = 'status bad';
        status.textContent = error.message;
      }
    }

    loadLabels();
  </script>
</body>
</html>
