<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TurbineLabelStudio</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* iframe fills the full panel-docs */
    #panel-docs iframe {
      width: 100%;
      border: 0;
      display: block;
    }
    #panel-docs {
      padding-top: 0;
    }
  </style>
</head>
<body>
  <header id="siteHeader"></header>
  <main class="page">

    <!-- Tab Navigation -->
    <div class="api-tabs">
      <button class="api-tab active" data-tab="nav">功能导航</button>
      <button class="api-tab" data-tab="docs">API 文档</button>
    </div>

    <!-- ==================== 功能导航面板 ==================== -->
    <section class="tab-panel active" id="panel-nav">
      <div class="grid-links">
        <a class="card" href="/annotation_view.html">
          <span class="card-kicker">标注</span>
          <strong>标注展示</strong>
          <span>查看 BUC 图片、标注框、标签结果和对应六个通道音频。</span>
        </a>
        <a class="card" href="/annotation_changes.html">
          <span class="card-kicker">审计</span>
          <strong>标注框变动</strong>
          <span>按人员、标签和 BUC 查看标注框的新增、修改和删除记录。</span>
        </a>
        <a class="card" href="/datasets.html">
          <span class="card-kicker">分组</span>
          <strong>数据集</strong>
          <span>查看数据集和 BUC 数量；管理员可新增、删除数据集。</span>
        </a>
        <a class="card" href="/labels.html">
          <span class="card-kicker">配置</span>
          <strong>标签管理</strong>
          <span>查看、编辑标签名称、描述、标注方法和 extra_info。</span>
        </a>
        <a class="card" href="/accounts.html">
          <span class="card-kicker">权限</span>
          <strong>账号管理</strong>
          <span>查看账号和角色；管理员可新增、编辑、停用账号。</span>
        </a>
      </div>
    </section>

    <!-- ==================== API 文档面板（iframe 嵌入） ==================== -->
    <section class="tab-panel" id="panel-docs">
    </section>

  </main>

  <script src="/static/common.js"></script>
  <script src="/static/api_docs.js"></script>
  <script>
    // Tab switching
    document.querySelectorAll('.api-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.api-tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
        // 切换到 docs tab 时加载 iframe（懒加载）
        if (btn.dataset.tab === 'docs') {
          const panel = document.getElementById('panel-docs');
          if (!panel.querySelector('iframe')) {
            const iframe = document.createElement('iframe');
            iframe.src = '/api_docs.html';
            iframe.style.height = 'calc(100vh - 180px)';
            panel.appendChild(iframe);
          }
        }
      });
    });

    // Login & header
    const user = requireLogin();
    renderHeader('index');
    apiFetch('/api/permissions').then(data => {
      setUser(data.user, data.permissions);
      renderHeader('index');
    }).catch(error => {
      console.warn(error.message);
    });
  </script>
</body>
</html>
