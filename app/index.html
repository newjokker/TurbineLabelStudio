<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>首页 - TurbineLabelStudio</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header id="siteHeader"></header>
  <main class="page">
    <section class="panel hero">
      <h2>管理入口</h2>
      <p>标签、账号分别在独立页面维护，后台服务由 FastAPI 提供接口。页面中的服务时间使用北京时间。</p>
      <p class="muted" id="permissionText"></p>
      <p class="muted" id="serverTime"></p>
    </section>
    <section class="grid-links">
      <a class="card" href="/label_view.html">
        <strong>标签查看</strong>
        <span>只读查看标签名称、描述、更新时间和 extra_info，不提供修改入口。</span>
      </a>
      <a class="card" href="/annotation_view.html">
        <strong>标注展示</strong>
        <span>查看 BUC 图片、标注框、标签结果和对应六个通道音频。</span>
      </a>
      <a class="card" href="/labels.html">
        <strong>标签管理</strong>
        <span>查看、编辑标签名称、描述、标注方法和 extra_info。</span>
      </a>
      <a class="card" href="/accounts.html">
        <strong>账号管理</strong>
        <span>查看账号和角色；管理员可新增、编辑、停用账号。</span>
      </a>
      <a class="card" href="/api/labels">
        <strong>接口检查</strong>
        <span>使用当前登录用户的页面请求接口；直接打开 API 需要请求头。</span>
      </a>
    </section>
  </main>
  <script src="/static/common.js"></script>
  <script>
    const user = requireLogin();
    renderHeader('index');
    renderPermissionText(document.getElementById('permissionText'));
    apiFetch('/api/permissions').then(data => {
      setUser(data.user, data.permissions);
      document.getElementById('serverTime').textContent = `服务器北京时间：${data.server_time}`;
      renderHeader('index');
      renderPermissionText(document.getElementById('permissionText'));
    }).catch(error => {
      document.getElementById('serverTime').textContent = error.message;
    });
  </script>
</body>
</html>
