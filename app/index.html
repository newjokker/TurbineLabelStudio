<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>首页 - TurbineLabelStudio</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header id="siteHeader"></header>
  <main class="page">
    <section class="grid-links">
      <a class="card" href="/label_view.html">
        <strong>标签查看</strong>
        <span>只读查看标签名称、描述、更新时间和 extra_info，不提供修改入口。</span>
      </a>
      <a class="card" href="/annotation_view.html">
        <strong>标注展示</strong>
        <span>查看 BUC 图片、标注框、标签结果和对应六个通道音频。</span>
      </a>
      <a class="card" href="/datasets.html">
        <strong>数据集</strong>
        <span>查看数据集和 BUC 归属；管理员可新增、删除和调整归属。</span>
      </a>
      <a class="card" href="/labels.html">
        <strong>标签管理</strong>
        <span>查看、编辑标签名称、描述、标注方法和 extra_info。</span>
      </a>
      <a class="card" href="/accounts.html">
        <strong>账号管理</strong>
        <span>查看账号和角色；管理员可新增、编辑、停用账号。</span>
      </a>
    </section>
  </main>
  <script src="/static/common.js"></script>
  <script>
    const user = requireLogin();
    renderHeader('index');
    apiFetch('/api/permissions').then(data => {
      setUser(data.user, data.permissions);
      renderHeader('index');
    }).catch(error => {
      console.warn(error.message);
    });
  </script>
</body>
</html>
