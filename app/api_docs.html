<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>API 文档 - TurbineLabelStudio</title>
  <link rel="icon" href="/static/images/img.ico" type="image/x-icon">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    html {
      height: 100%;
      overflow: hidden;
    }
    body {
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 0%, rgba(56, 102, 65, 0.12), transparent 28rem),
        linear-gradient(180deg, #fbfaf8 0%, #f2eee7 100%);
    }
    .page {
      max-width: 1240px;
      margin: 0 auto;
      padding: 22px 24px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100dvh;
      min-height: 0;
    }
    .api-hero {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 20px;
      padding: 18px 20px;
      border: 1px solid rgba(227, 222, 213, 0.9);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 10px 36px rgba(31, 35, 34, 0.08);
      backdrop-filter: blur(14px);
    }
    .api-hero h1 {
      margin: 0 0 6px;
      font-size: 24px;
      letter-spacing: 0;
    }
    .api-hero p {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
    }
    .api-hero-tools {
      display: grid;
      justify-items: end;
      gap: 10px;
    }
    .api-stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .api-stat {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }
    .api-stat strong {
      color: var(--text);
      font-size: 14px;
    }
    .api-sidebar-layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 20px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .api-toc {
      position: relative;
      top: auto;
      height: 100%;
      max-height: none;
      overflow: auto;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 10px 30px rgba(31, 35, 34, 0.06);
      align-content: start;
      overscroll-behavior: contain;
    }
    .api-detail {
      min-width: 0;
      height: 100%;
      overflow-y: auto;
      padding-bottom: 40px;
      padding-right: 4px;
      overscroll-behavior: contain;
      scroll-behavior: smooth;
    }
    .toc-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 0 0 10px;
      padding: 0 2px;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
    }
    .toc-count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }
    .toc-group-link,
    .toc-item {
      cursor: pointer;
    }
    .toc-group-link.active,
    .toc-item.active {
      background: var(--accent);
      color: #fff;
    }
    .toc-item.active .method-tag {
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.26);
    }
    iframe { width: 100%; border: 0; }
    @media (max-width: 900px) {
      html,
      body {
        overflow: auto;
        height: auto;
      }
      .page {
        height: auto;
        min-height: 100dvh;
        padding-bottom: 24px;
      }
      .api-hero {
        grid-template-columns: 1fr;
      }
      .api-hero-tools {
        justify-items: stretch;
      }
      .api-sidebar-layout {
        grid-template-columns: 1fr;
        overflow: visible;
      }
      .api-toc,
      .api-detail {
        height: auto;
        max-height: none;
      }
      .api-detail {
        overflow: visible;
        padding-right: 0;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="api-hero" id="top">
      <div>
        <h1>TurbineLabelStudio API</h1>
        <p>提供标注数据、音频文件、图片与数据集管理的开放接口。所有 Public API 需要登录后携带 Header 鉴权。</p>
      </div>
      <div class="api-hero-tools">
        <div class="api-stats" id="apiStats"></div>
        <input type="text" id="apiSearch" placeholder="搜索 API..." style="width:260px;min-height:38px;" oninput="filterApis()">
      </div>
    </section>

    <div class="api-sidebar-layout">
      <nav class="api-toc" id="apiToc"></nav>
      <div class="api-detail" id="apiDetail"></div>
    </div>
  </main>

  <script src="/static/common.js"></script>
  <script src="/static/api_docs.js"></script>
  <script>
    renderApiDocs();
  </script>
</body>
</html>
